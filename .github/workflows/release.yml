name: CI & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Verify
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o /dev/null ./cmd/hushed

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debs
          path: dist/*.deb

  apt-repo:
    name: Publish APT Repository
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Download .deb artifacts
        uses: actions/download-artifact@v4
        with:
          name: debs
          path: debs/

      - name: Checkout repo (to create gh-pages if needed)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: repo

      - name: Ensure gh-pages branch exists
        run: |
          cd repo
          if git ls-remote --exit-code origin gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
            git commit --allow-empty -m "init gh-pages"
            git push origin gh-pages
          fi
          cd ..
          cp -r repo gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build APT repository
        run: |
          set -e
          mkdir -p gh-pages/apt/pool/main
          # Copy new .deb files into pool
          cp debs/*.deb gh-pages/apt/pool/main/

          # Generate flat Packages index for each architecture
          cd gh-pages/apt
          mkdir -p dists/stable/main/binary-amd64
          mkdir -p dists/stable/main/binary-arm64

          dpkg-scanpackages --multiversion pool/main | \
            grep -v "^$" > /tmp/Packages_all

          grep -A 999 "Architecture: amd64" /tmp/Packages_all | \
            awk '/^Package:/{p=1} p{print} /^$/{p=0}' \
            > dists/stable/main/binary-amd64/Packages || true
          gzip -9 -k dists/stable/main/binary-amd64/Packages

          grep -A 999 "Architecture: arm64" /tmp/Packages_all | \
            awk '/^Package:/{p=1} p{print} /^$/{p=0}' \
            > dists/stable/main/binary-arm64/Packages || true
          gzip -9 -k dists/stable/main/binary-arm64/Packages

          # Generate Release file
          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin=hushed \
            -o APT::FTPArchive::Release::Label=hushed \
            -o APT::FTPArchive::Release::Suite=stable \
            -o APT::FTPArchive::Release::Codename=stable \
            -o APT::FTPArchive::Release::Architectures="amd64 arm64" \
            -o APT::FTPArchive::Release::Components=main \
            -o APT::FTPArchive::Release::Description="hushed APT repository" \
            release dists/stable > dists/stable/Release

      - name: Publish to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apt/
          git diff --cached --quiet || git commit -m "apt: publish ${GITHUB_REF_NAME}"
          git push origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
